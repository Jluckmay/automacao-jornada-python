<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Automação / Automation</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: white;
            --input-bg: white;
            --border-color: #d1d5db;
            --label-color: #4b5563;
            --btn-primary: #2563eb;
            --btn-primary-hover: #1d4ed8;
        }
        body.dark-mode {
            --bg-color: #111827;
            --text-color: #f9fafb;
            --card-bg: #1f2937;
            --input-bg: #374151;
            --border-color: #4b5563;
            --label-color: #d1d5db;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--bg-color); color: var(--text-color); margin: 0; transition: background-color 0.3s, color 0.3s; }
        
        /* Controles movidos para o canto inferior esquerdo para não atrapalhar o layout */
        .side-controls { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .control-btn { background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-btn:hover { border-color: var(--btn-primary); }

        .login-box { background: var(--card-bg); padding: 2.5rem; border-radius: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; transition: background-color 0.3s; }
        h1 { text-align: center; margin-bottom: 2rem; font-size: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--label-color); font-weight: 500; font-size: 0.9rem; }
        input { width: 100%; padding: 0.75rem; background-color: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; outline: none; transition: all 0.2s; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        button[type="submit"] { width: 100%; padding: 0.75rem; background-color: var(--btn-primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; transition: background-color 0.2s; }
        button[type="submit"]:hover { background-color: var(--btn-primary-hover); }

        .simulacao-btn { position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; background-color: #10b981; color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; transition: all 0.3s ease; z-index: 1000; }
        .simulacao-btn:hover { background-color: #059669; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="side-controls">
        <button id="btnLang" class="control-btn" tabindex="-1">🇬🇧 EN</button>
        <button id="btnTheme" class="control-btn" tabindex="-1">🌙 Dark</button>
    </div>

    <div class="login-box">
        <h1 id="txtTitle">Acesso ao Sistema</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email" id="txtEmail">E-mail</label>
                <input type="email" id="email" placeholder="Digite o seu e-mail" required autofocus>
            </div>
            <div class="form-group">
                <label for="senha" id="txtPass">Palavra-passe</label>
                <input type="password" id="senha" placeholder="A sua palavra-passe" required>
            </div>
            <button type="submit" id="btnSubmit">Fazer Login</button>
        </form>
    </div>

    <button id="btnSimulacaoIndex" class="simulacao-btn" tabindex="-1">
        ▶ <span id="txtBtnSim">Iniciar Simulação Completa</span>
    </button>

    <script>
        const dict = {
            'pt': { title: "Acesso ao Sistema", email: "E-mail", pass: "Palavra-passe", emailPlaceholder: "Digite o seu e-mail", passPlaceholder: "A sua palavra-passe", loginBtn: "Fazer Login", simBtn: "Iniciar Simulação Completa", simProcessing: "A processar...", langToggle: "🇬🇧 EN", themeLight: "☀️ Light", themeDark: "🌙 Dark" },
            'en': { title: "System Access", email: "Email", pass: "Password", emailPlaceholder: "Enter your email", passPlaceholder: "Your password", loginBtn: "Login", simBtn: "Start Full Simulation", simProcessing: "Processing...", langToggle: "🇵🇹 PT", themeLight: "☀️ Light", themeDark: "🌙 Dark" }
        };

        let currentLang = localStorage.getItem('lang') || 'pt';
        let isDarkMode = localStorage.getItem('theme') === 'dark';

        function applyTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                document.getElementById('btnTheme').innerText = dict[currentLang].themeLight;
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('btnTheme').innerText = dict[currentLang].themeDark;
            }
        }

        function applyLang() {
            document.getElementById('txtTitle').innerText = dict[currentLang].title;
            document.getElementById('txtEmail').innerText = dict[currentLang].email;
            document.getElementById('txtPass').innerText = dict[currentLang].pass;
            document.getElementById('email').placeholder = dict[currentLang].emailPlaceholder;
            document.getElementById('senha').placeholder = dict[currentLang].passPlaceholder;
            document.getElementById('btnSubmit').innerText = dict[currentLang].loginBtn;
            document.getElementById('txtBtnSim').innerText = dict[currentLang].simBtn;
            document.getElementById('btnLang').innerText = dict[currentLang].langToggle;
            document.getElementById('btnTheme').innerText = isDarkMode ? dict[currentLang].themeLight : dict[currentLang].themeDark;
        }

        applyTheme();
        applyLang();

        document.getElementById('btnTheme').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        });

        document.getElementById('btnLang').addEventListener('click', () => {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            localStorage.setItem('lang', currentLang);
            applyLang();
        });

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            window.location.href = "Tabela.html"; 
        });

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function digitar(campoId, texto) {
            const campo = document.getElementById(campoId);
            campo.focus();
            campo.value = ""; 
            for (let i = 0; i < texto.length; i++) {
                campo.value += texto.charAt(i);
                await sleep(60); 
            }
            await sleep(300); 
        }

        document.getElementById('btnSimulacaoIndex').addEventListener('click', async function() {
            document.getElementById('txtBtnSim').innerText = dict[currentLang].simProcessing;
            this.style.pointerEvents = "none"; 

            await sleep(500); 
            await digitar('email', 'automacao@hashtag.com');
            await digitar('senha', 'senha_super_secreta');
            
            document.getElementById('btnSubmit').focus();
            await sleep(500);

            // Mudado para localStorage para funcionar em arquivos locais
            localStorage.setItem('simulacaoAtiva', 'true');
            window.location.href = "tabela.html"; // Força o redirecionamento
        });
    </script>
</body>
</html>
